---
name: Changelog

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Write permission required to commit CHANGELOG.md back to main.
permissions:
  contents: write

jobs:
  changelog:
    name: Update CHANGELOG.md
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history required for changelog generation
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install git-changelog
        run: pip install git-changelog

      - name: Generate CHANGELOG.md
        run: git-changelog -o CHANGELOG.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "CHANGELOG.md is already up to date"
          else
            git commit -m "docs: update CHANGELOG.md [skip ci]"
            git push
          fi
