---
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ansible-lint + yamllint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-lint.txt

      - name: Install linting tools
        run: pip install -r requirements-lint.txt

      - name: Cache Ansible collections
        id: cache-collections
        uses: actions/cache@v5
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ hashFiles('requirements.yml') }}
          restore-keys: ansible-collections-

      - name: Install Ansible collections
        if: steps.cache-collections.outputs.cache-hit != 'true'
        run: ansible-galaxy collection install community.general ansible.posix kubernetes.core

      - name: Create vault password file
        run: printf '%s' "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > ~/.vault_pass.txt

      - name: Run yamllint
        run: yamllint .

      - name: Run ansible-lint
        if: success() || failure()
        run: ansible-lint
