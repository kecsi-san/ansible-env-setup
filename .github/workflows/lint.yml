---
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ansible-lint + yamllint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-lint.txt

      - name: Install linting tools
        run: pip install -r requirements-lint.txt

      - name: Cache Ansible collections
        id: cache-collections
        uses: actions/cache@v5
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ hashFiles('requirements.yml') }}
          restore-keys: ansible-collections-

      - name: Install Ansible collections
        if: steps.cache-collections.outputs.cache-hit != 'true'
        run: ansible-galaxy collection install community.general ansible.posix kubernetes.core

      - name: Create vault password file
        id: vault
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          if [ -n "$ANSIBLE_VAULT_PASSWORD" ]; then
            printf '%s' "$ANSIBLE_VAULT_PASSWORD" > ~/.vault_pass.txt
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run yamllint
        run: yamllint .

      - name: Run ansible-lint
        if: (success() || failure()) && steps.vault.outputs.available == 'true'
        run: ansible-lint

      - name: ansible-lint skipped — no vault password
        if: steps.vault.outputs.available != 'true'
        run: |
          echo "::notice::ansible-lint skipped: ANSIBLE_VAULT_PASSWORD secret not available."
          echo "::notice::To enable full linting on Dependabot PRs, add ANSIBLE_VAULT_PASSWORD"
          echo "::notice::to Dependabot secrets: repo Settings → Secrets → Dependabot."
