---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homepage
  namespace: homepage
  # No external-dns annotation — k3s is LAN only
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`homepage.k3s.<your-domain.tld>`)
      kind: Rule
      services:
        - name: homepage
          port: 3000
  tls: {}
