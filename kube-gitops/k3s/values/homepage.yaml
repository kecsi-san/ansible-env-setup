---
# Homepage values — k3s local dev cluster
enableRbac: true

serviceAccount:
  name: homepage
  create: true

env:
  HOMEPAGE_ALLOWED_HOSTS: homepage.k3s.kecskemethy.org

ingress:
  main:
    enabled: false  # using Traefik IngressRoute instead

config:
  settings:
    title: k3s
    allowedHosts: homepage.k3s.kecskemethy.org
    theme: dark
    color: slate
    headerStyle: clean
    layout:
      Kubernetes:
        style: row
        columns: 3

  widgets:
    - greeting:
        text: k3s dev cluster
    - datetime:
        text_size: xl
        format:
          dateStyle: short
          timeStyle: short
          hour12: false
    - resources:
        cpu: true
        memory: true
        disk: /
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: k3s
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true

  services:
    - Kubernetes:
        - ArgoCD:
            href: https://argocd.k3s.kecskemethy.org
            description: GitOps continuous delivery
            icon: argocd.png
            namespace: argocd
            app: argocd-server
        - Headlamp:
            href: https://headlamp.k3s.kecskemethy.org
            description: Kubernetes dashboard
            icon: headlamp.png
            namespace: kube-system
            app: headlamp
        - Traefik:
            href: https://traefik.k3s.kecskemethy.org/dashboard/
            description: Ingress controller
            icon: traefik.png
            namespace: traefik
            app: traefik
