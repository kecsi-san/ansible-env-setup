---
# Traefik values — k3s (local dev)
# k3s servicelb uses nftables DNAT (no real listener) — WSL2 mirrored mode
# requires hostPort to create actual listeners so Windows forwards packets to WSL2.
service:
  type: LoadBalancer

ports:
  web:
    hostPort: 80
    redirections:
      entryPoint:
        to: websecure
        scheme: https
  websecure:
    hostPort: 443

providers:
  kubernetesIngress:
    enabled: true
  kubernetesCRD:
    enabled: true

api:
  dashboard: true
  insecure: false

logs:
  general:
    level: INFO

ingressRoute:
  dashboard:
    enabled: false
