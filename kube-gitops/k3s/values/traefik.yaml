---
# Traefik values — k3s (local dev)
# hostNetwork: true puts Traefik in the host network namespace, creating real
# listeners on 80/443. Required for WSL2 mirrored mode — klipper-lb uses
# nftables DNAT (no real socket) which WSL2 does not forward to Windows.
# ClusterIP removes the LoadBalancer service so klipper-lb does not conflict.
hostNetwork: true

service:
  type: ClusterIP

updateStrategy:
  type: Recreate

ports:
  web:
    port: 80
    redirections:
      entryPoint:
        to: websecure
        scheme: https
  websecure:
    port: 443
  metrics:
    port: 9101  # 9100 is taken by prometheus-node-exporter on the host

securityContext:
  capabilities:
    drop: [ALL]
    add: [NET_BIND_SERVICE]
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

providers:
  kubernetesIngress:
    enabled: true
  kubernetesCRD:
    enabled: true

api:
  dashboard: true
  insecure: false

logs:
  general:
    level: INFO

ingressRoute:
  dashboard:
    enabled: false
