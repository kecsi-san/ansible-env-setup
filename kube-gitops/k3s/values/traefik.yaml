---
# Traefik values — k3s (local dev)
# k3s servicelb exposes LoadBalancer on the node IP (192.168.1.25)
service:
  type: LoadBalancer

ports:
  web:
    redirections:
      entryPoint:
        to: websecure
        scheme: https

providers:
  kubernetesIngress:
    enabled: true
  kubernetesCRD:
    enabled: true

api:
  dashboard: true
  insecure: false

logs:
  general:
    level: INFO

ingressRoute:
  dashboard:
    enabled: false
