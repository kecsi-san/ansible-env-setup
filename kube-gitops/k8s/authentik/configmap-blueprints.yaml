---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: authentik
data:
  forgejo.yaml: |
    version: 1
    metadata:
      name: Forgejo OAuth2 Application
      labels:
        blueprints.goauthentik.io/description: Forgejo Git server OAuth2 integration
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: Forgejo
        attrs:
          name: Forgejo
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: confidential
          client_id: forgejo
          client_secret: !Env FORGEJO_OAUTH2_CLIENT_SECRET
          redirect_uris:
            - matching_mode: strict
              url: https://forgejo.kecskemethy.org/user/oauth2/authentik/callback
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-openid"]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-profile"]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-email"]]
          sub_mode: user_username
          issuer_mode: global
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: forgejo
        attrs:
          name: Forgejo
          slug: forgejo
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Forgejo]]
          meta_description: Git server · OCI registry · CI
          policy_engine_mode: any

  longhorn.yaml: |
    version: 1
    metadata:
      name: Longhorn Proxy Application
      labels:
        blueprints.goauthentik.io/description: Longhorn storage dashboard forwardAuth
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: Longhorn
        attrs:
          name: Longhorn
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: forward_single
          external_host: https://longhorn.kecskemethy.org/

      - model: authentik_core.application
        state: present
        identifiers:
          slug: longhorn
        attrs:
          name: Longhorn
          slug: longhorn
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, Longhorn]]
          meta_description: Distributed block storage dashboard
          policy_engine_mode: any

  headlamp.yaml: |
    version: 1
    metadata:
      name: Headlamp OIDC Application
      labels:
        blueprints.goauthentik.io/description: Headlamp Kubernetes dashboard OIDC integration
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: Headlamp
        attrs:
          name: Headlamp
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: confidential
          client_id: headlamp
          client_secret: !Env HEADLAMP_OAUTH2_CLIENT_SECRET
          redirect_uris:
            - matching_mode: strict
              url: https://headlamp.kecskemethy.org/oidc-callback
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-openid"]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-profile"]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-email"]]
          sub_mode: user_username
          issuer_mode: per_provider
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          access_token_validity: "hours=24"
          refresh_token_validity: "days=30"

      - model: authentik_core.application
        state: present
        identifiers:
          slug: headlamp
        attrs:
          name: Headlamp
          slug: headlamp
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Headlamp]]
          meta_description: Kubernetes dashboard
          policy_engine_mode: any

  traefik-dashboard.yaml: |
    version: 1
    metadata:
      name: Traefik Dashboard Proxy Application
      labels:
        blueprints.goauthentik.io/description: Traefik dashboard forwardAuth
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: Traefik
        attrs:
          name: Traefik
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: forward_single
          external_host: https://traefik.kecskemethy.org/

      - model: authentik_core.application
        state: present
        identifiers:
          slug: traefik
        attrs:
          name: Traefik
          slug: traefik
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, Traefik]]
          meta_description: Ingress controller dashboard
          policy_engine_mode: any

  zzz-outpost.yaml: |
    version: 1
    metadata:
      name: Embedded Outpost Providers
      labels:
        blueprints.goauthentik.io/description: Assigns all proxy providers to the embedded outpost
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_outposts.outpost
        state: present
        identifiers:
          name: authentik Embedded Outpost
        attrs:
          providers:
            - !Find [authentik_providers_proxy.proxyprovider, [name, Longhorn]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, Traefik]]
