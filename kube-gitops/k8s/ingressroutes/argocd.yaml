---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd
  namespace: argocd
  annotations:
    external-dns.alpha.kubernetes.io/target: "9fa18953-8d82-424d-a8b5-9941940d4230.cfargotunnel.com"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`argocd.kecskemethy.org`)
      kind: Rule
      services:
        - name: argocd-server
          port: 80
  tls: {}
