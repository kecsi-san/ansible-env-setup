---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik
  # No external-dns annotation — LAN only, not exposed via Cloudflare Tunnel
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.kecskemethy.org`)
      kind: Rule
      middlewares:
        - name: authentik-forwardauth
          namespace: traefik
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: traefik-dashboard-tls
