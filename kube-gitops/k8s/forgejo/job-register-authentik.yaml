---
apiVersion: batch/v1
kind: Job
metadata:
  name: forgejo-register-authentik-oauth
  namespace: forgejo
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: register
          image: codeberg.org/forgejo/forgejo:10-rootless
          command:
            - /bin/sh
            - -c
            - |
              set -e
              mkdir -p /tmp/forgejo-work
              if forgejo admin auth list 2>/dev/null | grep -q "authentik"; then
                echo "Authentik OAuth2 source already configured"
                exit 0
              fi
              forgejo admin auth add-oauth \
                --name "authentik" \
                --provider openidConnect \
                --key "forgejo" \
                --secret "${AUTHENTIK_CLIENT_SECRET}" \
                --auto-discover-url "https://authentik.kecskemethy.org/application/o/forgejo/.well-known/openid-configuration" \
                --scopes "openid profile email"
              echo "Authentik OAuth2 source registered successfully"
          env:
            - name: GITEA_WORK_DIR
              value: /tmp/forgejo-work
            - name: GITEA__database__DB_TYPE
              value: postgres
            - name: GITEA__database__HOST
              value: postgres-rw.postgres.svc.cluster.local:5432
            - name: GITEA__database__NAME
              value: forgejo
            - name: GITEA__database__USER
              value: forgejo
            - name: GITEA__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: forgejo-db-credentials
                  key: password
            - name: GITEA__security__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: forgejo-secret-key
                  key: secret-key
            - name: GITEA__security__INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-secret-key
                  key: internal-token
            - name: GITEA__security__INSTALL_LOCK
              value: "true"
            - name: AUTHENTIK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: forgejo-authentik-oauth2
                  key: client-secret
