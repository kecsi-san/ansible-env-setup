---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: forgejo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo
  template:
    metadata:
      labels:
        app: forgejo
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: forgejo
          image: codeberg.org/forgejo/forgejo:10-rootless
          ports:
            - name: http
              containerPort: 3000
            - name: ssh
              containerPort: 2222
          env:
            - name: GITEA__APP_NAME
              value: "Forgejo"
            - name: GITEA__server__DOMAIN
              value: "forgejo.kecskemethy.org"
            - name: GITEA__server__ROOT_URL
              value: "https://forgejo.kecskemethy.org/"
            - name: GITEA__server__SSH_DOMAIN
              value: "forgejo.kecskemethy.org"
            - name: GITEA__server__SSH_PORT
              value: "22"
            - name: GITEA__server__SSH_LISTEN_PORT
              value: "2222"
            - name: GITEA__server__START_SSH_SERVER
              value: "true"
            - name: GITEA__server__OFFLINE_MODE
              value: "false"
            - name: GITEA__database__DB_TYPE
              value: "postgres"
            - name: GITEA__database__HOST
              value: "postgres-rw.postgres.svc.cluster.local:5432"
            - name: GITEA__database__NAME
              value: "forgejo"
            - name: GITEA__database__USER
              value: "forgejo"
            - name: GITEA__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: forgejo-db-credentials
                  key: password
            - name: GITEA__repository__DEFAULT_BRANCH
              value: "main"
            - name: GITEA__session__PROVIDER
              value: "db"
            - name: GITEA__cache__ADAPTER
              value: "memory"
            - name: GITEA__queue__TYPE
              value: "level"
            - name: GITEA__indexer__ISSUE_INDEXER_TYPE
              value: "bleve"
            - name: GITEA__service__DISABLE_REGISTRATION
              value: "true"
            - name: GITEA__service__ENABLE_REMEMBER_ME
              value: "false"
            - name: GITEA__security__INSTALL_LOCK
              value: "true"
            - name: GITEA__security__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: forgejo-secret-key
                  key: secret-key
            - name: GITEA__security__INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-secret-key
                  key: internal-token
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/gitea
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forgejo-data
        - name: tmp
          emptyDir: {}
