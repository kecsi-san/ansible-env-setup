---
# Traefik values — k8s (bare-metal, kube-vip)
service:
  type: LoadBalancer
  annotations:
    kube-vip.io/loadbalancerIPs: "192.168.1.101"

ports:
  web:
    redirectTo:
      port: websecure

providers:
  kubernetesIngress:
    enabled: true
  kubernetesCRD:
    enabled: true

api:
  dashboard: true
  insecure: false

logs:
  general:
    level: INFO

# Dashboard is exposed via IngressRoute in kube-gitops/k8s/apps — not via Helm.
ingressRoute:
  dashboard:
    enabled: false
