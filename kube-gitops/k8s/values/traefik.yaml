---
# Traefik values — k8s (bare-metal, kube-vip)
service:
  type: LoadBalancer
  annotations:
    kube-vip.io/loadbalancerIPs: "192.168.1.101"

ports:
  web:
    redirections:
      entryPoint:
        to: websecure
        scheme: https
  websecure:
    http3:
      enabled: false
    transport:
      respondingTimeouts:
        idleTimeout: "20s"

# Force HTTP/1.1 only — prevents Firefox from coalescing all *.kecskemethy.org
# into a single H2 connection. H2 coalescing + ArgoCD SSE means an ArgoCD pod
# restart stales the shared connection for every other service too.
tlsOptions:
  default:
    alpnProtocols:
      - "http/1.1"

providers:
  kubernetesIngress:
    enabled: true
  kubernetesCRD:
    enabled: true

api:
  dashboard: true
  insecure: false

logs:
  general:
    level: INFO

# Dashboard is exposed via IngressRoute in kube-gitops/k8s/apps — not via Helm.
ingressRoute:
  dashboard:
    enabled: false
