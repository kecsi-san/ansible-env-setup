---
# Homepage values — k8s homelab dashboard
enableRbac: true

serviceAccount:
  name: homepage
  create: true

env:
  HOMEPAGE_ALLOWED_HOSTS: homepage.<your-domain.tld>

ingress:
  main:
    enabled: false  # using Traefik IngressRoute instead

config:
  settings:
    title: Homelab
    allowedHosts: homepage.<your-domain.tld>
    theme: dark
    color: slate
    headerStyle: clean
    layout:
      Kubernetes:
        style: row
        columns: 3
      Monitoring:
        style: row
        columns: 3
      Apps:
        style: row
        columns: 3

  widgets:
    - greeting:
        text: Homelab
    - datetime:
        text_size: xl
        format:
          dateStyle: short
          timeStyle: short
          hour12: false
    - resources:
        cpu: true
        memory: true
        disk: /
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: k8s
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true

  services:
    - Kubernetes:
        - ArgoCD:
            href: https://argocd.<your-domain.tld>
            description: GitOps continuous delivery
            icon: argo-cd.png
            namespace: argocd
            app: argocd-server
        - Headlamp:
            href: https://headlamp.<your-domain.tld>
            description: Kubernetes dashboard
            icon: headlamp.png
            namespace: kube-system
            app: headlamp
        - Longhorn:
            href: https://longhorn.<your-domain.tld>
            description: Distributed block storage — LAN only
            icon: longhorn.png
            namespace: longhorn-system
            app: longhorn-manager
        - Traefik:
            href: https://traefik.<your-domain.tld>/dashboard/
            description: Ingress controller — LAN only
            icon: traefik.png
            namespace: traefik
            app: traefik
    - Monitoring:
        - Gatus:
            href: https://gatus.<your-domain.tld>
            description: Uptime monitoring
            icon: gatus.png
            namespace: gatus
            app: gatus
        - ntfy:
            href: https://ntfy.<your-domain.tld>
            description: Push notifications
            icon: ntfy.png
            namespace: ntfy
            app: ntfy
    - Apps:
        - Mealie:
            href: https://mealie.<your-domain.tld>
            description: Recipe manager
            icon: mealie.png
            namespace: mealie
            app: mealie
