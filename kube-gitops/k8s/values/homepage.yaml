---
# Homepage values — k8s homelab dashboard
enableRbac: true

serviceAccount:
  name: homepage
  create: true

env:
  HOMEPAGE_ALLOWED_HOSTS: homepage.kecskemethy.org

ingress:
  main:
    enabled: false  # using Traefik IngressRoute instead

config:
  settings:
    title: Homelab
    allowedHosts: homepage.kecskemethy.org
    theme: dark
    color: slate
    headerStyle: clean
    background:
      image: https://raw.githubusercontent.com/kecsi-san/homelab/main/kube-gitops/k8s/homepage/moon-space-art-bg.jpg

      saturate: 50
      brightness: 50
      opacity: 50
    layout:
      Kubernetes:
        style: row
        columns: 3
      Monitoring:
        style: row
        columns: 3
      Apps:
        style: row
        columns: 3
      Platform:
        style: row
        columns: 3

  widgets:
    - greeting:
        text: Homelab
    - datetime:
        text_size: xl
        format:
          dateStyle: short
          timeStyle: short
          hour12: false
    - resources:
        cpu: true
        memory: true
        disk: /
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: k8s
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true

  services:
    - Kubernetes:
        - ArgoCD:
            href: https://argocd.kecskemethy.org
            description: GitOps continuous delivery
            icon: argo-cd.png
            namespace: argocd
            app: argocd-server
        - Headlamp:
            href: https://headlamp.kecskemethy.org
            description: Kubernetes dashboard
            icon: headlamp.png
            namespace: kube-system
            app: headlamp
        - Longhorn:
            href: https://longhorn.kecskemethy.org
            description: Distributed block storage — LAN only
            icon: longhorn.png
            namespace: longhorn-system
            app: longhorn-manager
        - Traefik:
            href: https://traefik.kecskemethy.org/dashboard/
            description: Ingress controller — LAN only
            icon: traefik.png
            namespace: traefik
            app: traefik
    - Monitoring:
        - Gatus:
            href: https://gatus.kecskemethy.org
            description: Uptime monitoring
            icon: gatus.png
            namespace: gatus
            app: gatus
        - ntfy:
            href: https://ntfy.kecskemethy.org
            description: Push notifications
            icon: ntfy.png
            namespace: ntfy
            app: ntfy
    - Apps:
        - Mealie:
            href: https://mealie.kecskemethy.org
            description: Recipe manager
            icon: mealie.png
            namespace: mealie
            app: mealie
        - Glance:
            href: https://glance.kecskemethy.org
            description: Personal feed dashboard
            icon: https://raw.githubusercontent.com/glanceapp/glance/main/docs/logo.png
            namespace: glance
            app: glance
    - Platform:
        - Forgejo:
            href: https://forgejo.kecskemethy.org
            description: Git server · OCI registry · CI
            icon: forgejo.png
            namespace: forgejo
            app: forgejo
        - Authentik:
            href: https://authentik.kecskemethy.org
            description: Identity provider · SSO
            icon: authentik.png
            namespace: authentik
            app: authentik-server
        - Outline:
            href: https://outline.kecskemethy.org
            description: Wiki · documentation
            icon: outline.png
            namespace: outline
            app: outline
