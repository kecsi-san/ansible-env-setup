---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://charts.longhorn.io
      chart: longhorn
      targetRevision: "1.11.0"
      helm:
        valueFiles:
          - $values/kube-gitops/k8s/values/longhorn.yaml
    - repoURL: https://github.com/kecsi-san/ansible-env-setup.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  # Fresh-install note: Longhorn's pre-upgrade Helm hook (mapped to ArgoCD PreSync) fails
  # on first install because the longhorn-service-account doesn't exist yet. Workaround:
  #   argocd app terminate-op longhorn
  #   argocd app sync longhorn --strategy apply   (skips hooks for this sync only)
