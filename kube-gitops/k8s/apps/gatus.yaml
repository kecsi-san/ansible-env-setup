---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatus
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://twin.github.io/helm-charts
      chart: gatus
      targetRevision: "1.5.0"
      helm:
        valueFiles:
          - $values/kube-gitops/k8s/values/gatus.yaml
    - repoURL: https://github.com/kecsi-san/homelab.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/kecsi-san/homelab.git
      targetRevision: HEAD
      path: kube-gitops/k8s/gatus
  destination:
    server: https://kubernetes.default.svc
    namespace: gatus
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
