---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ntfy
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    # OCI chart — must be registered as a Helm repo in ArgoCD if it fails:
    #   argocd repo add oci://codeberg.org/wrenix/helm-charts --type helm --enable-oci
    - repoURL: oci://codeberg.org/wrenix/helm-charts
      chart: ntfy
      targetRevision: "0.5.15"
      helm:
        valueFiles:
          - $values/kube-gitops/k8s/values/ntfy.yaml
    - repoURL: https://github.com/kecsi-san/ansible-env-setup.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: ntfy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
