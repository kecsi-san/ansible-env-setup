---
# IMPORTANT: Sealed Secrets generates a key pair on first install.
# If the cluster is rebuilt, the new controller key will differ and existing
# SealedSecret resources will be undecryptable.
# Mitigation: back up the key pair before teardown and restore after reinstall:
#   kubectl get secret -n sealed-secrets -l sealedsecrets.bitnami.com/sealed-secrets-key \
#     -o yaml > sealed-secrets-key.yaml
#   kubectl apply -f sealed-secrets-key.yaml  # restore before ArgoCD syncs this app
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://bitnami-labs.github.io/sealed-secrets
      chart: sealed-secrets
      targetRevision: "2.16.1"
      helm:
        valueFiles:
          - $values/kube-gitops/k8s/values/sealed-secrets.yaml
    - repoURL: https://github.com/kecsi-san/ansible-env-setup.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
