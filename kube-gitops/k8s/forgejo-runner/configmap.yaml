---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forgejo-runner-config
  namespace: forgejo-runner
data:
  config.yml: |
    log:
      level: info
    runner:
      file: /data/.runner
      capacity: 2
      timeout: 3h
      insecure: false
    cache:
      enabled: true
      dir: /data/cache
    container:
      network: bridge
      privileged: false
      options: "-v /var/run/docker.sock:/var/run/docker.sock"
      workdir_parent: /data/workspaces
