---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
  namespace: forgejo-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      initContainers:
        - name: register
          image: code.forgejo.org/forgejo/runner:12.10.1
          command:
            - sh
            - -c
            - |
              [ -f /data/.runner ] && echo "already registered, skipping" && exit 0
              forgejo-runner register --no-interactive \
                --instance "https://forgejo.kecskemethy.org" \
                --token "$RUNNER_TOKEN" \
                --name "k8s-runner" \
                --labels "ubuntu-latest:docker://node:20-bookworm,self-hosted:docker://node:20-bookworm"
          env:
            - name: RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-runner-token
                  key: token
          volumeMounts:
            - name: runner-data
              mountPath: /data
            - name: docker-sock
              mountPath: /var/run
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:12.10.1
          command:
            - sh
            - -c
            - |
              until wget -qO- http://localhost:2375/_ping 2>/dev/null | grep -q OK; do
                echo "waiting for docker daemon..."
                sleep 2
              done
              exec forgejo-runner daemon --config /config/config.yml
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2375
          volumeMounts:
            - name: runner-data
              mountPath: /data
            - name: runner-config
              mountPath: /config
            - name: docker-sock
              mountPath: /var/run
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: "1"
        - name: dind
          image: docker:27-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 2Gi
              cpu: "2"
      volumes:
        - name: runner-data
          persistentVolumeClaim:
            claimName: forgejo-runner-data
        - name: runner-config
          configMap:
            name: forgejo-runner-config
        - name: docker-sock
          emptyDir: {}
