---
# NOTE: k3s ships Traefik as a built-in component.
# Disable it before applying this app:
#   Add --disable=traefik to k3s server args (or set in /etc/rancher/k3s/config.yaml:
#     disable: [traefik])
# Without disabling the built-in, two Traefik instances will conflict.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://traefik.github.io/charts
      chart: traefik
      targetRevision: "34.4.1"
      helm:
        valueFiles:
          - $values/gitops/k3s/values/traefik.yaml
    - repoURL: https://github.com/kecsi-san/ansible-env-setup.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
