---
- hosts: kube
  become: false
  remote_user: "{{ ansible_ssh_user }}"
  tasks:
    - name: Upgrade Debian packages
      ansible.builtin.import_role:
        name: debian_upgrade
      become: true
      tags:
        - update
        - maintenance

    - name: Configure SSH
      ansible.builtin.import_role:
        name: configure_ssh
      become: true
      tags:
        - ssh
        - prerequisites
        - developer

    - name: Configure sudo
      ansible.builtin.import_role:
        name: configure_sudo
      become: true
      tags:
        - sudo
        - prerequisites
        - developer

    - name: Configure /etc/hosts
      ansible.builtin.import_role:
        name: configure_etc-hosts
      become: true
      tags:
        - hosts
        - prerequisites

    - name: Setup legal banner
      ansible.builtin.import_role:
        name: setup_legal_banner
      become: true
      tags:
        - banner
        - security

    - name: Upload profile image
      ansible.builtin.import_role:
        name: upload_profile_image
      become: false
      tags:
        - face
        - desktop

    - name: Upload favourite background images
      ansible.builtin.import_role:
        name: upload_fav_bgimages
      become: true
      tags:
        - bgimages
        - desktop

    - name: Install nerd fonts
      ansible.builtin.import_role:
        name: install_nerd_fonts
      become: false
      tags:
        - fonts
        - desktop

    - name: Configure oh-my-posh
      ansible.builtin.import_role:
        name: configure_oh-my-posh
      become: false
      tags:
        - omp
        - fancy
        - developer

    - name: Configure fzf
      ansible.builtin.import_role:
        name: configure_fzf
      become: false
      tags:
        - fzf
        - fancy
        - developer

    - name: Configure git
      ansible.builtin.import_role:
        name: configure_git
      become: false
      tags:
        - gitconfig
        - git
        - developer

    - name: Disable hibernation
      ansible.builtin.import_role:
        name: disable_hibernation
      become: true
      tags:
        - hibernation
        - server

    - name: Setup minimal packages
      ansible.builtin.import_role:
        name: setup_minimal
      become: true
      tags:
        - minimal

    - name: Setup network tools
      ansible.builtin.import_role:
        name: setup_network-tools
      become: true
      tags:
        - network
