---
- name: Post-cluster setup — local dev (k3s)
  hosts: localhost
  connection: local
  become: false
  tasks:
    - name: Install ArgoCD
      ansible.builtin.import_role:
        name: setup_argocd
      vars:
        argocd_kubeconfig: "~/.kube/k3s.yaml"
      tags:
        - argocd

    - name: Bootstrap ArgoCD root application
      ansible.builtin.import_role:
        name: setup_argocd-apps
      vars:
        argocd_apps_kubeconfig: "~/.kube/k3s.yaml"
        argocd_apps_cluster_type: k3s
      tags:
        - argocd-apps
