---
- name: Post-cluster setup — local dev (k3s)
  hosts: localhost
  connection: local
  become: false
  tasks:
    - name: Install Traefik ingress controller
      ansible.builtin.import_role:
        name: setup_traefik
      vars:
        traefik_kubeconfig: "~/.kube/k3s.yaml"
      tags:
        - traefik

    - name: Install Sealed Secrets controller
      ansible.builtin.import_role:
        name: setup_sealed-secrets
      vars:
        sealed_secrets_kubeconfig: "~/.kube/k3s.yaml"
      tags:
        - sealed-secrets

    - name: Install Headlamp Kubernetes dashboard
      ansible.builtin.import_role:
        name: setup_headlamp
      vars:
        headlamp_kubeconfig: "~/.kube/k3s.yaml"
      tags:
        - headlamp
