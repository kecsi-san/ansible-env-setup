---
# Sets up backup infrastructure on hppd600g6:
#   - 100G LV from existing VG, formatted ext4, mounted at /backups
#   - NFS export to 192.168.1.0/25
#   - Restic REST server (systemd) storing repos in /backups/restic-repos
#
# Usage:
#   ansible-playbook playbooks/backup-nfs.yml

- name: Set up NFS backup storage
  hosts: hppd600g6
  become: false

  roles:
    - role: setup_nfs-backup
      tags: [nfs-backup]
    - role: setup_restic-rest-server
      tags: [restic-rest-server]
