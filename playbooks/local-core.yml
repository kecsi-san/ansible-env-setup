---
- name: Configure local workstation — core system
  hosts: localhost
  connection: local
  become: false
  tasks:
    - name: Install linuxbrew
      ansible.builtin.import_role:
        name: install_linuxbrew
      when: ansible_system == 'Linux'
      tags:
        - brew

    - name: Setup apt repositories — core
      ansible.builtin.import_role:
        name: setup_apt_repos
      become: true
      when: ansible_system == 'Linux'
      vars:
        apt_repo_docker: true
        apt_repo_charm: false
        apt_repo_mozilla: true
        docker_packages:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        mozilla_packages:
          - firefox
          - thunderbird
      tags:
        - apt-repos
        - docker
        - apps

    - name: Install desktop applications via Homebrew Cask (macOS)
      community.general.homebrew_cask:
        name: "{{ item }}"
        state: present
      loop:
        - firefox
        - thunderbird
      become: false
      when: ansible_system == 'Darwin'
      tags:
        - apps

    - name: Install Colima and Docker CLI tools (macOS)
      community.general.homebrew:
        name:
          - colima
          - docker
          - docker-compose
          - docker-buildx
        state: present
      become: false
      when: ansible_system == 'Darwin'
      tags:
        - docker

    - name: Enable Colima autostart on login (macOS)
      community.general.homebrew_services:
        name: colima
        state: present
      become: false
      when:
        - ansible_system == 'Darwin'
        - colima_autostart | default(true)
      tags:
        - docker

    - name: Get Homebrew prefix (macOS)
      ansible.builtin.command: brew --prefix
      register: brew_prefix_result
      changed_when: false
      become: false
      when: ansible_system == 'Darwin'
      tags:
        - docker

    - name: Install bash-completion@2 via Homebrew (macOS)
      community.general.homebrew:
        name: bash-completion@2
        state: present
      become: false
      when: ansible_system == 'Darwin'
      tags:
        - docker

    - name: Enable bash-completion@2 in ~/.bash_profile (macOS)
      ansible.builtin.blockinfile:
        dest: "{{ ansible_env.HOME }}/.bash_profile"
        create: true
        mode: '0644'
        marker: "# {mark} ANSIBLE MANAGED BLOCK: bash-completion"
        block: |
          [[ -r "{{ brew_prefix_result.stdout }}/etc/profile.d/bash_completion.sh" ]] && \
            . "{{ brew_prefix_result.stdout }}/etc/profile.d/bash_completion.sh"
      become: false
      when: ansible_system == 'Darwin'
      tags:
        - docker

    - name: Generate docker bash completion (macOS)
      ansible.builtin.command:
        cmd: "{{ brew_prefix_result.stdout }}/bin/docker completion bash"
      register: docker_completion
      changed_when: false
      become: false
      when: ansible_system == 'Darwin'
      tags:
        - docker

    - name: Install docker bash completion (macOS)
      ansible.builtin.copy:
        content: "{{ docker_completion.stdout }}"
        dest: "{{ brew_prefix_result.stdout }}/share/bash-completion/completions/docker"
        mode: '0644'
      become: false
      when: ansible_system == 'Darwin'
      tags:
        - docker

    - name: Generate colima bash completion (macOS)
      ansible.builtin.command:
        cmd: "{{ brew_prefix_result.stdout }}/bin/colima completion bash"
      register: colima_completion
      changed_when: false
      become: false
      when: ansible_system == 'Darwin'
      tags:
        - docker

    - name: Install colima bash completion (macOS)
      ansible.builtin.copy:
        content: "{{ colima_completion.stdout }}"
        dest: "{{ brew_prefix_result.stdout }}/share/bash-completion/completions/colima"
        mode: '0644'
      become: false
      when: ansible_system == 'Darwin'
      tags:
        - docker

    - name: Generate docker-compose bash completion (macOS)
      ansible.builtin.command:
        cmd: "{{ brew_prefix_result.stdout }}/bin/docker-compose completion bash"
      register: docker_compose_completion
      changed_when: false
      become: false
      when: ansible_system == 'Darwin'
      tags:
        - docker

    - name: Install docker-compose bash completion (macOS)
      ansible.builtin.copy:
        content: "{{ docker_compose_completion.stdout }}"
        dest: "{{ brew_prefix_result.stdout }}/share/bash-completion/completions/docker-compose"
        mode: '0644'
      become: false
      when: ansible_system == 'Darwin'
      tags:
        - docker

    - name: Setup minimal packages
      ansible.builtin.import_role:
        name: setup_minimal
      become: true
      vars:
        install_base_packages: true
        install_brew_base_packages: true
        brew_base_packages:
          - fzf
          - gcc
          - git-delta
          - go-task
          - just
          - oh-my-posh
          - pre-commit
          - python@3.12
          - uv
          - yq
      tags:
        - minimal

    - name: Setup network tools
      ansible.builtin.import_role:
        name: setup_network-tools
      become: true
      when: network_tools_enabled
      vars:
        network_tools_enabled: true
      tags:
        - network

    - name: Setup Python uv packages
      ansible.builtin.import_role:
        name: setup_python-uv
      vars:
        python_version: 3.12
        uv_tools:
          - name: ansible
          - name: ansible-lint
          - name: black
          - name: commitizen
          - name: flake8
          - name: git-changelog
          - name: git-semver
          - name: gitstats
          - name: mkdocs
            extras:
              - mkdocs-material
              - mkdocstrings-python
          - name: mypy
          - name: pdoc3
          - name: pip-audit
          - name: pip-tools
          - name: pipreqs
          - name: pylint
          - name: pytest
          - name: ruff
          - name: yamllint
        uv_pip_packages:
          - atlassian-python-api
          - datadog-api-client
          - diagrams
          - graphviz
          - hvac
          - jira
          - jsonpath-ng
          - lxml
          - markdown2
          - matplotlib
          - mkdocstrings-python
          - nc-py-api
          - openai
          - pyhcl
          - PyJWT
          - pyOpenSSL
          - pytest-asyncio
          - pytest-cov
          - pytest-mock
          - python-jenkins
          - requests-mock
          - setuptools-scm
          - tfparse
          - tinycss2
      tags:
        - python
        - uv
