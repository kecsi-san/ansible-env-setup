---
- name: Configure local workstation — core system
  hosts: localhost
  connection: local
  become: false
  tasks:
    - name: Install linuxbrew
      ansible.builtin.import_role:
        name: install_linuxbrew
      when: ansible_system == 'Linux'
      tags:
        - brew

    - name: Setup apt repositories — core
      ansible.builtin.import_role:
        name: setup_apt_repos
      become: true
      when: ansible_system == 'Linux'
      vars:
        apt_repo_docker: true
        apt_repo_charm: false
        apt_repo_mozilla: true
        docker_packages:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        firefox_packages:
          - firefox
          - thunderbird
      tags:
        - apt-repos
        - docker
        - apps

    - name: Install desktop applications via Homebrew Cask (macOS)
      community.general.homebrew_cask:
        name: "{{ item }}"
        state: present
      loop:
        - firefox
        - thunderbird
      become: false
      when: ansible_system == 'Darwin'
      tags:
        - apps

    - name: Setup minimal packages
      ansible.builtin.import_role:
        name: setup_minimal
      become: true
      vars:
        install_base_packages: true
        install_brew_base_packages: true
        brew_base_packages:
          - fzf
          - gcc
          - git-delta
          - go-task
          - just
          - oh-my-posh
          - pre-commit
          - python@3.12
          - uv
          - yq
      tags:
        - minimal

    - name: Setup network tools
      ansible.builtin.import_role:
        name: setup_network-tools
      become: true
      when: network_tools_enabled
      vars:
        network_tools_enabled: true
      tags:
        - network

    - name: Setup Python uv packages
      ansible.builtin.import_role:
        name: setup_python-uv
      vars:
        python_version: 3.12
        uv_tools:
          - name: ansible
          - name: ansible-lint
          - name: black
          - name: commitizen
          - name: flake8
          - name: git-changelog
          - name: git-semver
          - name: gitstats
          - name: mkdocs
            extras:
              - mkdocs-material
              - mkdocstrings-python
          - name: mypy
          - name: pdoc3
          - name: pip-audit
          - name: pip-tools
          - name: pipreqs
          - name: pylint
          - name: pytest
          - name: ruff
          - name: yamllint
        uv_pip_packages:
          - atlassian-python-api
          - datadog-api-client
          - diagrams
          - graphviz
          - hvac
          - jira
          - jsonpath-ng
          - lxml
          - markdown2
          - matplotlib
          - mkdocstrings-python
          - nc-py-api
          - openai
          - pyhcl
          - PyJWT
          - pyOpenSSL
          - pytest-asyncio
          - pytest-cov
          - pytest-mock
          - python-jenkins
          - requests-mock
          - setuptools-scm
          - tfparse
          - tinycss2
      tags:
        - python
        - uv
