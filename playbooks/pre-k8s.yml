---
# Runs after prerequisite.yml and before kubespray.yml
# Prepares nodes with system-level tooling needed before cluster installation
- name: Pre-Kubernetes node preparation
  hosts: kube
  become: false
  remote_user: "{{ ansible_ssh_user }}"
  tasks:
    - name: Setup etckeeper
      ansible.builtin.import_role:
        name: setup_etckeeper
      become: true
      tags:
        - etckeeper
