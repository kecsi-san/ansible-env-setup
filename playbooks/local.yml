---
- hosts: localhost
  name: Configure local system, basically testing playbook
  connection: local
  become: false
  tasks:
    - name: Configure passwordless sudo
      ansible.builtin.import_role:
        name: configure_sudo
      become: true
      tags:
        - sudo

    - name: Install linuxbrew
      ansible.builtin.import_role:
        name: install_linuxbrew
      when: ansible_system == 'Linux'
      tags:
        - brew

    - name: Setup apt repositories
      ansible.builtin.import_role:
        name: setup_apt_repos
      become: true
      when: ansible_system == 'Linux'
      vars:
        apt_repo_docker: true
        apt_repo_grafana: false
        apt_repo_telegraf: false
        apt_repo_charm: false
        apt_repo_mise: false
        apt_repo_mozilla: false
        apt_repo_sury_php: false
        apt_repo_gitea: false
        apt_repo_duosecurity: false
        apt_repo_twilio: false
        apt_repo_yarn: false
        apt_repo_microsoft: false
        docker_packages:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        firefox_packages:
          - firefox
      tags:
        - apt-repos
        - docker

    - name: Setup security tools
      ansible.builtin.import_role:
        name: setup_security-tools
      vars:
        security_apt_packages:
          - fail2ban
          - rkhunter
      tags:
        - security

    - name: Setup minimal packages
      ansible.builtin.import_role:
        name: setup_minimal
      become: true
      vars:
        install_base_packages: true
        install_brew_base_packages: true
        brew_base_packages:
          - fzf
          - gcc
          - git-delta
          - go-task
          - just
          - oh-my-posh
          - pre-commit
          - python@3.12
          - uv
          - yq
      tags:
        - minimal

    - name: Setup network tools
      ansible.builtin.import_role:
        name: setup_network-tools
      become: true
      when: ansible_system == 'Linux'
      tags:
        - network

    - name: Setup Python uv packages
      ansible.builtin.import_role:
        name: setup_python-uv
      vars:
        python_version: 3.12
        uv_tools:
          - name: ansible
          - name: black
          - name: checkov
          - name: commitizen
          - name: flake8
          - name: git-changelog
          - name: git-semver
          - name: gitstats
          - name: mkdocs
            extras:
              - mkdocs-material
              - mkdocstrings-python
          - name: mypy
          - name: pdoc3
          - name: pip-audit
          - name: pip-tools
          - name: pipreqs
          - name: pylint
          - name: pytest
          - name: ruff
        uv_pip_packages:
          - atlassian-python-api
          - aws-lambda-powertools
          - aws-xray-sdk
          - datadog-api-client
          - diagrams
          - graphviz
          - hvac
          - jira
          - jsonpath-ng
          - lxml
          - markdown2
          - matplotlib
          - mkdocstrings-python
          - nc-py-api
          - openai
          - parliament
          - pyhcl
          - PyJWT
          - pyOpenSSL
          - pytest-asyncio
          - pytest-cov
          - pytest-mock
          - python-jenkins
          - requests-mock
          - setuptools-scm
          - tfparse
          - tinycss2
      tags:
        - python
        - uv

    - name: Install nerd fonts
      ansible.builtin.import_role:
        name: install_nerd_fonts
      vars:
        nerd_fonts:
          font-meslo-lg-nerd-font: true          # recommended for oh-my-posh
          font-fira-code-nerd-font: true         # ligatures
          font-3270-nerd-font: false
          font-agave-nerd-font: false
          font-anonymice-nerd-font: false
          font-arimo-nerd-font: false
          font-aurulent-sans-mono-nerd-font: false
          font-bigblue-terminal-nerd-font: false
          font-bitstream-vera-sans-mono-nerd-font: false
          font-blex-mono-nerd-font: false
          font-caskaydia-cove-nerd-font: false
          font-code-new-roman-nerd-font: false
          font-cousine-nerd-font: false
          font-daddy-time-mono-nerd-font: false
          font-dejavu-sans-mono-nerd-font: false
          font-droid-sans-mono-nerd-font: false
          font-fantasque-sans-mono-nerd-font: false
          font-fira-mono-nerd-font: false
          font-go-mono-nerd-font: false
          font-gohufont-nerd-font: false
          font-hack-nerd-font: false
          font-hasklug-nerd-font: false
          font-heavy-data-nerd-font: false
          font-hurmit-nerd-font: false
          font-im-writing-nerd-font: false
          font-inconsolata-go-nerd-font: false
          font-inconsolata-lgc-nerd-font: false
          font-inconsolata-nerd-font: false
          font-iosevka-nerd-font: false
          font-jetbrains-mono-nerd-font: false
          font-lekton-nerd-font: false
          font-liberation-nerd-font: false
          font-monofur-nerd-font: false
          font-monoid-nerd-font: false
          font-mononoki-nerd-font: false
          font-mplus-nerd-font: false
          font-noto-nerd-font: false
          font-open-dyslexic-nerd-font: false
          font-overpass-nerd-font: false
          font-profont-nerd-font: false
          font-proggy-clean-tt-nerd-font: false
          font-roboto-mono-nerd-font: false
          font-sauce-code-pro-nerd-font: false
          font-shure-tech-mono-nerd-font: false
          font-space-mono-nerd-font: false
          font-terminess-ttf-nerd-font: false
          font-tinos-nerd-font: false
          font-ubuntu-mono-nerd-font: false
          font-ubuntu-nerd-font: false
          font-victor-mono-nerd-font: false
      tags:
        - fonts
        - desktop

    - name: Setup VS Code
      ansible.builtin.import_role:
        name: setup_vscode
      when: ansible_system == 'Linux'
      vars:
        vscode_extensions:
          - docker.docker
          - github.copilot-chat
          - hashicorp.terraform
          - ms-azuretools.vscode-containers
          - ms-azuretools.vscode-docker
          - ms-kubernetes-tools.vscode-kubernetes-tools
          - ms-python.debugpy
          - ms-python.isort
          - ms-python.python
          - ms-python.vscode-pylance
          - ms-python.vscode-python-envs
          - ms-toolsai.jupyter
          - ms-toolsai.jupyter-keymap
          - ms-toolsai.jupyter-renderers
          - ms-toolsai.vscode-jupyter-cell-tags
          - ms-toolsai.vscode-jupyter-slideshow
          - ms-vscode.makefile-tools
          - redhat.vscode-yaml
          - searking.preview-vscode
          - tim-koehler.helm-intellisense
      tags:
        - vscode

    - name: Setup IaC Terraform tooling
      ansible.builtin.import_role:
        name: setup_iac-terraform
      become: false
      vars:
        iac_brew_packages:
          - terraform
          - terraform-docs
          - tflint
          - trivy
      tags:
        - iac
        - terraform

    - name: Setup extra IaC tooling
      ansible.builtin.import_role:
        name: setup_iac-extra
      become: false
      vars:
        iac_extra_brew_packages:
          - opentofu
          - terragrunt
          - terrascan
          - tfupdate
      tags:
        - iac
        - iac-extra

    - name: Setup kube extra tooling
      ansible.builtin.import_role:
        name: setup_kube-extra
      tags:
        - kube
        - kubernetes
