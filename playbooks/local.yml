---
- hosts: localhost
  name: Configure local system, basically testing playbook
  connection: local
  become: false
  tasks:
    - name: Configure sudo
      ansible.builtin.import_role:
        name: configure_sudo
      become: true
      tags:
        - sudo

    - name: Install linuxbrew
      ansible.builtin.import_role:
        name: install_linuxbrew
      tags:
        - brew

    - name: Setup minimal packages
      ansible.builtin.import_role:
        name: setup_minimal
      become: true
      tags:
        - minimal

    - name: Setup network tools
      ansible.builtin.import_role:
        name: setup_network-tools
      become: true
      tags:
        - network

    - name: Upgrade Homebrew packages
      ansible.builtin.import_role:
        name: upgrade_brew
      become: false
      tags:
        - upgrade
        - brew

    - name: Setup Python uv packages
      ansible.builtin.import_role:
        name: setup_python-uv
      tags:
        - python
        - uv

