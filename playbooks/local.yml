---
- hosts: localhost
  name: Configure local system, basically testing playbook
  connection: local
  become: false
  vars:

    # -------------------------------------------------------------------------
    # setup_apt_repos — enable/disable individual apt repositories
    # -------------------------------------------------------------------------
    apt_repo_docker: true
    apt_repo_grafana: false
    apt_repo_telegraf: false
    apt_repo_charm: false
    apt_repo_mise: false
    apt_repo_mozilla: false
    apt_repo_sury_php: false
    apt_repo_gitea: false
    apt_repo_duosecurity: false
    apt_repo_twilio: false
    apt_repo_yarn: false
    apt_repo_microsoft: false

    docker_packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin

    firefox_packages:
      - firefox

    # -------------------------------------------------------------------------
    # setup_security-tools
    # -------------------------------------------------------------------------
    security_apt_packages:
      - fail2ban
      - rkhunter

    # -------------------------------------------------------------------------
    # setup_minimal
    # -------------------------------------------------------------------------
    install_base_packages: true
    install_brew_base_packages: true

    brew_base_packages:
      - fzf
      - gcc
      - git-delta
      - go-task
      - oh-my-posh
      - pre-commit
      - pyenv
      - python@3.12
      - uv
      - yq

    # -------------------------------------------------------------------------
    # setup_python-uv
    # -------------------------------------------------------------------------
    python_version: 3.12

    uv_tools:
      - name: ansible
      - name: black
      - name: checkov
      - name: flake8
      - name: git-changelog
      - name: git-semver
      - name: gitstats
      - name: mkdocs
        extras:
          - mkdocs-material
          - mkdocstrings-python
      - name: pdoc3
      - name: pip-audit
      - name: pip-tools
      - name: pipreqs
      - name: pylint

    uv_pip_packages:
      - atlassian-python-api
      - aws-lambda-powertools
      - aws-xray-sdk
      - datadog-api-client
      - diagrams
      - graphviz
      - hvac
      - jira
      - jsonpath-ng
      - lxml
      - markdown2
      - matplotlib
      - mkdocstrings-python
      - nc-py-api
      - openai
      - parliament
      - pyhcl
      - PyJWT
      - pyOpenSSL
      - pytest-asyncio
      - pytest-cov
      - pytest-mock
      - python-jenkins
      - requests-mock
      - setuptools-scm
      - tfparse
      - tinycss2

    # -------------------------------------------------------------------------
    # setup_iac-terraform
    # -------------------------------------------------------------------------
    iac_brew_packages:
      - terraform
      - terraform-docs
      - tflint
      - trivy

    # -------------------------------------------------------------------------
    # setup_iac-extra
    # -------------------------------------------------------------------------
    iac_extra_brew_packages:
      - opentofu
      - terragrunt
      - terrascan
      - tfupdate

    # -------------------------------------------------------------------------
    # setup_vscode (incomplete — VS Code runs on Windows in WSL2 setup)
    # -------------------------------------------------------------------------
    vscode_extensions:
      - docker.docker
      - github.copilot-chat
      - hashicorp.terraform
      - ms-azuretools.vscode-containers
      - ms-azuretools.vscode-docker
      - ms-kubernetes-tools.vscode-kubernetes-tools
      - ms-python.debugpy
      - ms-python.isort
      - ms-python.python
      - ms-python.vscode-pylance
      - ms-python.vscode-python-envs
      - ms-toolsai.jupyter
      - ms-toolsai.jupyter-keymap
      - ms-toolsai.jupyter-renderers
      - ms-toolsai.vscode-jupyter-cell-tags
      - ms-toolsai.vscode-jupyter-slideshow
      - ms-vscode.makefile-tools
      - redhat.vscode-yaml
      - searking.preview-vscode
      - tim-koehler.helm-intellisense

  tasks:
    - name: Configure sudo
      ansible.builtin.import_role:
        name: configure_sudo
      become: true
      tags:
        - sudo

    - name: Install linuxbrew
      ansible.builtin.import_role:
        name: install_linuxbrew
      tags:
        - brew

    - name: Setup apt repositories
      ansible.builtin.import_role:
        name: setup_apt_repos
      become: true
      tags:
        - apt-repos
        - docker

    - name: Setup security tools
      ansible.builtin.import_role:
        name: setup_security-tools
      tags:
        - security

    - name: Setup minimal packages
      ansible.builtin.import_role:
        name: setup_minimal
      become: true
      tags:
        - minimal

    - name: Setup network tools
      ansible.builtin.import_role:
        name: setup_network-tools
      become: true
      tags:
        - network

    - name: Setup Python uv packages
      ansible.builtin.import_role:
        name: setup_python-uv
      tags:
        - python
        - uv

    - name: Setup VS Code
      ansible.builtin.import_role:
        name: setup_vscode
      tags:
        - vscode

    - name: Setup IaC Terraform tooling
      ansible.builtin.import_role:
        name: setup_iac-terraform
      become: false
      tags:
        - iac
        - terraform

    - name: Setup extra IaC tooling
      ansible.builtin.import_role:
        name: setup_iac-extra
      become: false
      tags:
        - iac
        - iac-extra

    - name: Setup kube extra tooling
      ansible.builtin.import_role:
        name: setup_kube-extra
      tags:
        - kube
        - kubernetes
