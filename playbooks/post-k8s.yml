---
- name: Post-cluster setup — homelab (k8s)
  hosts: kube
  become: false
  remote_user: "{{ ansible_ssh_user }}"
  tasks:
    - name: Setup Longhorn distributed storage
      ansible.builtin.import_role:
        name: setup_longhorn
      tags:
        - longhorn
        - storage

    - name: Setup kube-extra (kubeconfig + KUBECONFIG env)
      ansible.builtin.import_role:
        name: setup_kube-extra
      become: false
      tags:
        - kubeconfig
        - kubernetes

    - name: Install Traefik ingress controller
      ansible.builtin.import_role:
        name: setup_traefik
      vars:
        traefik_kubeconfig: "~/.kube/k8s-kinet-local.yaml"
      tags:
        - traefik

    - name: Install Sealed Secrets controller
      ansible.builtin.import_role:
        name: setup_sealed-secrets
      vars:
        sealed_secrets_kubeconfig: "~/.kube/k8s-kinet-local.yaml"
      tags:
        - sealed-secrets
