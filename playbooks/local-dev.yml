---
- name: Configure local workstation — dev tooling
  hosts: localhost
  connection: local
  become: false
  tasks:
    - name: Setup apt repositories — dev
      ansible.builtin.import_role:
        name: setup_apt_repos
      become: true
      when: ansible_system == 'Linux'
      vars:
        apt_repo_mise: false
        apt_repo_sury_php: false
        apt_repo_twilio: false
        apt_repo_yarn: false
        apt_repo_microsoft: false
      tags:
        - apt-repos

    - name: Install GitHub CLI
      community.general.homebrew:
        name: gh
        state: present
      become: false
      tags:
        - gh
        - dev

    - name: Setup VS Code
      ansible.builtin.import_role:
        name: setup_vscode
      when: vscode_enabled
      vars:
        vscode_enabled: false  # incomplete role — see roles/setup_vscode/README.md
        vscode_extensions:
          - docker.docker
          - github.copilot-chat
          - hashicorp.terraform
          - ms-azuretools.vscode-containers
          - ms-azuretools.vscode-docker
          - ms-kubernetes-tools.vscode-kubernetes-tools
          - ms-python.debugpy
          - ms-python.isort
          - ms-python.python
          - ms-python.vscode-pylance
          - ms-python.vscode-python-envs
          - ms-toolsai.jupyter
          - ms-toolsai.jupyter-keymap
          - ms-toolsai.jupyter-renderers
          - ms-toolsai.vscode-jupyter-cell-tags
          - ms-toolsai.vscode-jupyter-slideshow
          - ms-vscode.makefile-tools
          - redhat.vscode-yaml
          - searking.preview-vscode
          - tim-koehler.helm-intellisense
      tags:
        - vscode

    - name: Setup Go development tooling
      ansible.builtin.import_role:
        name: setup_go-dev-tools
      when: go_dev_enabled
      vars:
        go_dev_enabled: false
        go_brew_packages:
          - go
          - gopls
          - golangci-lint
        go_optional_brew_packages:
          delve: false
          goreleaser: false
          ko: false
          air: false
      tags:
        - go
        - dev

    - name: Setup Node.js development tooling
      ansible.builtin.import_role:
        name: setup_nodejs-dev-tools
      when: nodejs_dev_enabled
      vars:
        nodejs_dev_enabled: true
        nodejs_brew_packages:
          - node
          - pnpm
        nodejs_optional_brew_packages:
          yarn: false
          typescript: false
          tsx: false
          eslint: false
          prettier: false
        nodejs_npm_global_packages: []
      tags:
        - nodejs
        - dev

    - name: Setup Rust development tooling
      ansible.builtin.import_role:
        name: setup_rust-dev-tools
      when: rust_dev_enabled
      vars:
        rust_dev_enabled: false
        rustup_profile: default
        rustup_toolchain: stable
        rust_cargo_tools:
          cargo-watch: false
          cargo-edit: false
          cargo-nextest: false
          cross: false
          bacon: false
          sccache: false
      tags:
        - rust
        - dev
