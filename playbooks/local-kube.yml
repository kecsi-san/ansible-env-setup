---
- name: Configure local workstation — Kubernetes tooling
  hosts: localhost
  connection: local
  become: false
  tasks:
    - name: Setup kube extra tooling
      ansible.builtin.import_role:
        name: setup_kube-extra
      tags:
        - kube
        - kubernetes

    - name: Install cloudflared
      community.general.homebrew:
        name: cloudflared
        state: present
      tags:
        - cloudflared

    - name: Install kind
      community.general.homebrew:
        name: kind
        state: present
      tags:
        - kind
