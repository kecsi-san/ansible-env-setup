---
aws_enabled: true

# Installed via Homebrew (cross-platform)
aws_brew_packages:
  - awscli
  - aws-sam-cli

# Optional tools — set to true to install
aws_optional_brew_packages:
  okta-aws-cli: false
  eksctl: false
  aws-vault: false

# Session Manager Plugin — Linux only (no Homebrew formula for Linux)
session_manager_plugin_url: "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb"
session_manager_plugin_deb: "/tmp/session-manager-plugin.deb"

# AWS Python library packages — installed into the shared devops venv via uv pip
aws_python_packages_enabled: true
aws_python_packages:
  - aws-lambda-powertools   # Lambda middleware, tracing, logging, metrics
  - aws-xray-sdk            # Distributed tracing
  - parliament              # AWS IAM policy linter

# uv settings — must match setup_python-uv
uv_bin: /home/linuxbrew/.linuxbrew/bin/uv
uv_venv_path: "{{ ansible_env.HOME }}/.venv/devops"
