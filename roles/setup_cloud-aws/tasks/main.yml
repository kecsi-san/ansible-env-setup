---
# AWS CLI + SAM CLI via Homebrew (cross-platform)
- name: Install AWS tools via Homebrew
  community.general.homebrew:
    name: "{{ aws_brew_packages }}"
    state: present
  become: false

# Optional AWS tools via Homebrew
- name: Install optional AWS tools via Homebrew
  community.general.homebrew:
    name: "{{ aws_optional_brew_packages | dict2items | selectattr('value', 'equalto', true) | map(attribute='key') | list }}"
    state: present
  become: false
  when: aws_optional_brew_packages.values() | list | select | list | length > 0

# Session Manager Plugin — Linux only (.deb from AWS)
- name: Download Session Manager Plugin installer
  ansible.builtin.get_url:
    url: "{{ session_manager_plugin_url }}"
    dest: "{{ session_manager_plugin_deb }}"
    mode: '0644'
  become: false
  when: ansible_system == 'Linux'

- name: Install Session Manager Plugin
  ansible.builtin.apt:
    deb: "{{ session_manager_plugin_deb }}"
    state: present
  become: true
  when: ansible_system == 'Linux'
