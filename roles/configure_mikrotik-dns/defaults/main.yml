---
# MikroTik router connection — set in secrets.yml
# mikrotik_host: "192.168.1.1"
# mikrotik_user: "ansible"
# mikrotik_password: "changeme"

mikrotik_dns_ttl: "5m"

mikrotik_dns_records:
  # Kubernetes API VIP — exact name record
  - name: "api.k8s.{{ domain_name }}"
    address: "{{ kube_vip_address }}"

  # k8s services wildcard (*.kecskemethy.org → Traefik) — RouterOS match-subdomain format
  - name: "{{ domain_name }}"
    address: "{{ k8s_traefik_ip | default('') }}"
    match_subdomain: true

  # k3s cluster wildcard (Traefik ingress) — RouterOS match-subdomain format
  - name: "k3s.{{ domain_name }}"
    address: "{{ k3s_traefik_ip | default('') }}"
    match_subdomain: true

  # NFS backup server (hppd600g6)
  - name: "backups.kinet.local"
    address: "192.168.1.52"

# AAAA (IPv6) override records — point wildcard domains to loopback so browsers
# prefer IPv4 (A records) over Cloudflare's public AAAA proxy addresses on LAN.
# Without these, Happy Eyeballs selects Cloudflare IPv6 → QUIC fails on LAN.
mikrotik_dns6_records:
  # ::1 (loopback) — on Windows nothing listens on [::1]:443 so Happy Eyeballs falls back to IPv4 instantly.
  # WSL2 conflict (k3s Traefik on loopback) is resolved via /etc/hosts on the WSL2 host.
  - name: "{{ domain_name }}"
    address: "::1"
    match_subdomain: true

  # ::1 (loopback) — k3s runs on WSL2; cert matches *.k3s.kecskemethy.org on both paths
  - name: "k3s.{{ domain_name }}"
    address: "::1"
    match_subdomain: true
