---
- name: Update existing MikroTik static DNS records
  community.routeros.api_find_and_modify:
    hostname: "{{ mikrotik_host }}"
    username: "{{ mikrotik_user }}"
    password: "{{ mikrotik_password }}"
    path: ip dns static
    find:
      name: "{{ item.name }}"
      type: A
    values:
      address: "{{ item.address }}"
      ttl: "{{ mikrotik_dns_ttl }}"
      disabled: "false"
      match-subdomain: "{{ 'true' if item.match_subdomain | default(false) else 'false' }}"
    require_matches_min: 0
    require_matches_max: 1
  loop: "{{ mikrotik_dns_records }}"
  when: item.address | length > 0
  register: dns_update
  loop_control:
    label: "{{ item.name }} → {{ item.address }}"

- name: Add missing MikroTik static DNS records
  community.routeros.api:
    hostname: "{{ mikrotik_host }}"
    username: "{{ mikrotik_user }}"
    password: "{{ mikrotik_password }}"
    path: ip dns static
    add: >-
      name={{ item.item.name }}
      address={{ item.item.address }}
      ttl={{ mikrotik_dns_ttl }}
      match-subdomain={{ 'yes' if item.item.match_subdomain | default(false) else 'no' }}
      disabled=no
  loop: "{{ dns_update.results }}"
  when:
    - not (item.skipped | default(false))
    - item.match_count | default(0) == 0
  loop_control:
    label: "{{ item.item.name }} → {{ item.item.address }}"

# One-time migration: ::1 broke WSL2 (k3s Traefik listens on loopback).
# Find old records by name+old-address and update in-place; noop when gone.
- name: Migrate ::1 AAAA records to fd42::1
  community.routeros.api_find_and_modify:
    hostname: "{{ mikrotik_host }}"
    username: "{{ mikrotik_user }}"
    password: "{{ mikrotik_password }}"
    path: ip dns static
    find:
      name: "{{ item.name }}"
      address: "::1"
    values:
      address: "fd42::1"
    require_matches_min: 0
    require_matches_max: 1
  loop: "{{ mikrotik_dns6_records }}"
  loop_control:
    label: "migrate {{ item.name }} ::1 → fd42::1"

- name: Update existing MikroTik static AAAA records
  community.routeros.api_find_and_modify:
    hostname: "{{ mikrotik_host }}"
    username: "{{ mikrotik_user }}"
    password: "{{ mikrotik_password }}"
    path: ip dns static
    find:
      name: "{{ item.name }}"
      type: AAAA
    values:
      address: "{{ item.address }}"
      ttl: "{{ mikrotik_dns_ttl }}"
      disabled: "false"
      match-subdomain: "{{ 'true' if item.match_subdomain | default(false) else 'false' }}"
    require_matches_min: 0
    require_matches_max: 1
  loop: "{{ mikrotik_dns6_records }}"
  register: dns6_update
  loop_control:
    label: "{{ item.name }} → {{ item.address }} (AAAA)"

- name: Add missing MikroTik static AAAA records
  community.routeros.api:
    hostname: "{{ mikrotik_host }}"
    username: "{{ mikrotik_user }}"
    password: "{{ mikrotik_password }}"
    path: ip dns static
    add: >-
      name={{ item.item.name }}
      address={{ item.item.address }}
      ttl={{ mikrotik_dns_ttl }}
      match-subdomain={{ 'yes' if item.item.match_subdomain | default(false) else 'no' }}
      disabled=no
  loop: "{{ dns6_update.results }}"
  when:
    - not (item.skipped | default(false))
    - item.match_count | default(0) == 0
  loop_control:
    label: "{{ item.item.name }} → {{ item.item.address }} (AAAA)"
