---
- name: Ensure MikroTik static DNS records are present
  community.routeros.api_find_and_modify:
    hostname: "{{ mikrotik_host }}"
    username: "{{ mikrotik_user }}"
    password: "{{ mikrotik_password }}"
    path: ip dns static
    find:
      name: "{{ item.name }}"
    values:
      address: "{{ item.address }}"
      ttl: "{{ mikrotik_dns_ttl }}"
      disabled: "false"
    require_matches_min: 0
    require_matches_max: 1
    create_if_not_exists: true
  loop: "{{ mikrotik_dns_records }}"
  when: item.address | length > 0
  loop_control:
    label: "{{ item.name }} → {{ item.address }}"
