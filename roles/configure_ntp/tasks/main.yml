---
- name: Stop and disable systemd-timesyncd
  ansible.builtin.service:
    name: systemd-timesyncd
    state: stopped
    enabled: false
  become: true
  failed_when: false

- name: Install chrony
  ansible.builtin.apt:
    name: chrony
    state: present
    update_cache: false
  become: true

- name: Deploy chrony.conf
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart chrony

- name: Ensure chrony is started and enabled
  ansible.builtin.service:
    name: chrony
    state: started
    enabled: true
  become: true
