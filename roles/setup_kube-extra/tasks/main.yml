---
- name: Load OS specific variables
  ansible.builtin.include_vars: "os/{{ ansible_system }}.yml"

- name: Tap fluxcd Homebrew repository
  community.general.homebrew_tap:
    name: fluxcd/tap
    state: present
  become: false

- name: Install kubectl via Homebrew
  community.general.homebrew:
    name: kubectl
    state: present
  become: false

- name: Install helm via Homebrew
  community.general.homebrew:
    name: helm
    state: present
  become: false

- name: Install helm-diff plugin
  kubernetes.core.helm_plugin:
    plugin_path: "https://github.com/databus23/helm-diff"
    state: present
  become: false

- name: Install argocd CLI via Homebrew
  community.general.homebrew:
    name: argocd
    state: present
  become: false

- name: Install flux CLI via Homebrew (fluxcd tap)
  community.general.homebrew:
    name: fluxcd/tap/flux
    state: present
  become: false

- name: Generate kubectl bash completion
  ansible.builtin.command:
    cmd: "{{ kubectl_bin }} completion bash"
  register: kubectl_completion
  changed_when: false
  become: false
  when: ansible_system == 'Linux'

- name: Install kubectl bash completion system-wide
  ansible.builtin.copy:
    content: "{{ kubectl_completion.stdout }}"
    dest: /etc/bash_completion.d/kubectl
    mode: '0644'
  become: true
  when: ansible_system == 'Linux'

- name: Generate helm bash completion
  ansible.builtin.command:
    cmd: "{{ helm_bin }} completion bash"
  register: helm_completion
  changed_when: false
  become: false
  when: ansible_system == 'Linux'

- name: Install helm bash completion system-wide
  ansible.builtin.copy:
    content: "{{ helm_completion.stdout }}"
    dest: /etc/bash_completion.d/helm
    mode: '0644'
  become: true
  when: ansible_system == 'Linux'

- name: Generate argocd bash completion
  ansible.builtin.command:
    cmd: "{{ argocd_bin }} completion bash"
  register: argocd_completion
  changed_when: false
  become: false
  when: ansible_system == 'Linux'

- name: Install argocd bash completion system-wide
  ansible.builtin.copy:
    content: "{{ argocd_completion.stdout }}"
    dest: /etc/bash_completion.d/argocd
    mode: '0644'
  become: true
  when: ansible_system == 'Linux'

- name: Generate flux bash completion
  ansible.builtin.command:
    cmd: "{{ flux_bin }} completion bash"
  register: flux_completion
  changed_when: false
  become: false
  when: ansible_system == 'Linux'

- name: Install flux bash completion system-wide
  ansible.builtin.copy:
    content: "{{ flux_completion.stdout }}"
    dest: /etc/bash_completion.d/flux
    mode: '0644'
  become: true
  when: ansible_system == 'Linux'

- name: Install kubectl alias and completion system-wide
  ansible.builtin.copy:
    dest: /etc/profile.d/kubectl-alias.sh
    content: |
      alias k=kubectl
      complete -o default -F __start_kubectl k
    mode: '0644'
  become: true
  when: ansible_system == 'Linux'
