---
- name: Load OS specific variables
  ansible.builtin.include_vars: "os/{{ ansible_system }}.yml"

- name: Install uv CLI tools
  ansible.builtin.command:
    cmd: "{{ uv_bin }} tool install --python {{ python_version }} {{ item.name }}{% for e in item.extras | default([]) %} --with {{ e }}{% endfor %}"
  loop: "{{ uv_tools }}"
  loop_control:
    label: "{{ item.name }}"
  become: false
  changed_when: false

- name: Create devops virtualenv
  ansible.builtin.command:
    cmd: "{{ uv_bin }} venv --python {{ python_version }} {{ uv_venv_path }}"
    creates: "{{ uv_venv_path }}/pyvenv.cfg"
  become: false

- name: Install pip packages into devops venv
  ansible.builtin.command:
    cmd: "{{ uv_bin }} pip install {{ uv_pip_packages | join(' ') }}"
  environment:
    VIRTUAL_ENV: "{{ uv_venv_path }}"
  become: false
  changed_when: false

- name: Add devops venv auto-activation to ~/.bashrc
  ansible.builtin.blockinfile:
    dest: "{{ ansible_env.HOME }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK: devops venv"
    block: |
      source {{ uv_venv_path }}/bin/activate
  become: false
  when: uv_venv_autoactivate
