---
python_version: 3.12

# Shared virtualenv for library packages (Tier 3 pip packages)
uv_venv_path: "{{ ansible_env.HOME }}/.venv/devops"

# Automatically activate the devops venv in ~/.bashrc
uv_venv_autoactivate: true

# CLI tools installed in isolated environments via `uv tool install`.
uv_tools:
  - name: ansible
  - name: ansible-lint
  - name: checkov
  - name: git-changelog
  - name: pip-audit
  - name: ruff
  - name: yamllint

# Library packages installed into the shared devops venv via `uv pip install`.
# Activate with: source ~/.venv/devops/bin/activate
uv_pip_packages:
  - atlassian-python-api
  - datadog-api-client
  - diagrams
  - graphviz
  - hvac
  - jira
  - jsonpath-ng
  - lxml
  - markdown2
  - matplotlib
  - nc-py-api
  - openai
  - pyhcl
  - PyJWT
  - pyOpenSSL
  - python-jenkins
  - requests-mock
  - setuptools-scm
  - tfparse
  - tinycss2
