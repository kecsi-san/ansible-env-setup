---
python_version: 3.12
# Path to the uv binary (installed via Homebrew on Linux)
uv_bin: /home/linuxbrew/.linuxbrew/bin/uv

# Shared virtualenv for library packages (Tier 3 pip packages)
uv_venv_path: "{{ ansible_env.HOME }}/.venv/devops"

# CLI tools installed in isolated environments via `uv tool install`.
# Use extras to pull in plugins that must share the same env (e.g. mkdocs + mkdocstrings).
uv_tools:
  - name: ansible
  - name: black
  - name: checkov
  - name: commitizen
  - name: flake8
  - name: git-changelog
  - name: git-semver
  - name: gitstats
  - name: jupyter
  - name: mkdocs
    extras:
      - mkdocs-material
      - mkdocstrings-python
  - name: mypy
  - name: pdoc3
  - name: pip-audit
  - name: pip-tools
  - name: pipreqs
  - name: pylint
  - name: pytest
  - name: ruff

# Library packages installed into the shared devops venv via `uv pip install`.
# Activate with: source ~/.venv/devops/bin/activate
uv_pip_packages:
  - atlassian-python-api
  - aws-lambda-powertools
  - aws-xray-sdk
  - datadog-api-client
  - diagrams
  - graphviz
  - hvac
  - jira
  - jsonpath-ng
  - lxml
  - markdown2
  - matplotlib
  - mkdocstrings-python
  - nc-py-api
  - openai
  - parliament
  - pyhcl
  - PyJWT
  - pyOpenSSL
  - pytest-asyncio
  - pytest-cov
  - pytest-mock
  - python-jenkins
  - requests-mock
  - setuptools-scm
  - tfparse
  - tinycss2
