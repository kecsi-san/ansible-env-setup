---
- name: Create oh-my-posh themes directory
  ansible.builtin.file:
    path: "{{ omp_themes_dir }}"
    state: directory
    mode: '0755'
  become: false

- name: Copy epam omp theme file
  ansible.builtin.copy:
    src: "files/epam.omp.yaml"
    dest: "{{ omp_themes_dir }}/epam.omp.yaml"
    mode: '0644'
  become: false

- name: Copy Debian omp theme file
  ansible.builtin.copy:
    src: "files/debian.omp.yaml"
    dest: "{{ omp_themes_dir }}/debian.omp.yaml"
    mode: '0644'
  become: false
  when: ansible_distribution == 'Debian'

- name: Copy default omp theme file
  ansible.builtin.copy:
    src: "files/{{ default_omp_theme }}"
    dest: "{{ omp_themes_dir }}/{{ default_omp_theme }}"
    mode: '0644'
  become: false
  when: ansible_distribution != 'Debian'

- name: Select oh-my-posh theme
  ansible.builtin.set_fact:
    active_omp_theme: "{{ 'epam.omp.yaml' if ansible_hostname.startswith('EP') else ('debian.omp.yaml' if ansible_distribution == 'Debian' else default_omp_theme) }}"

- name: Add oh-my-posh init into .bashrc (if it exists)
  block:
    - name: Set path to .bashrc
      ansible.builtin.set_fact:
        bashrc_path: "{{ home }}/.bashrc"
      when: bashrc_path is undefined

    - name: Check whether .bashrc file exists
      ansible.builtin.stat:
        path: "{{ bashrc_path }}"
      register: bashrc_st

    - name: Resolve .bashrc symlink
      ansible.builtin.set_fact:
        bashrc_path: "{{ bashrc_st.stat.lnk_source }}"
      when:
        - bashrc_st.stat.exists
        - bashrc_st.stat.islnk

    - name: Load omp in .bashrc
      ansible.builtin.blockinfile:
        dest: "{{ bashrc_path }}"
        marker: "# {mark} ANSIBLE MANAGED BLOCK: oh-my-posh"
        block: |
          eval "$(oh-my-posh init bash --config {{ omp_themes_dir }}/{{ active_omp_theme }})"
      when: bashrc_st.stat.exists
