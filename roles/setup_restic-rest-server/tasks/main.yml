---
- name: Download restic rest-server binary
  ansible.builtin.unarchive:
    src: >-
      https://github.com/restic/rest-server/releases/download/v{{ restic_rest_server_version }}/rest-server_{{ restic_rest_server_version }}_linux_amd64.tar.gz
    dest: /tmp
    remote_src: true
    creates: "/tmp/rest-server_{{ restic_rest_server_version }}_linux_amd64"
  become: false
  tags: [restic-rest-server]

- name: Install rest-server binary
  ansible.builtin.copy:
    src: "/tmp/rest-server_{{ restic_rest_server_version }}_linux_amd64/rest-server"
    dest: "{{ restic_rest_server_binary }}"
    mode: "0755"
    owner: root
    group: root
    remote_src: true
  become: true
  tags: [restic-rest-server]

- name: Create restic repos directory
  ansible.builtin.file:
    path: "{{ restic_rest_server_path }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags: [restic-rest-server]

- name: Install restic rest-server systemd service
  ansible.builtin.template:
    src: rest-server.service.j2
    dest: /etc/systemd/system/rest-server.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify:
    - Reload systemd
    - Restart rest-server
  tags: [restic-rest-server]

- name: Enable and start restic rest-server
  ansible.builtin.service:
    name: rest-server
    state: started
    enabled: true
  become: true
  tags: [restic-rest-server]
