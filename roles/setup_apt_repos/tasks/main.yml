# --- Twilio CLI ---

- name: Download Twilio GPG key
  ansible.builtin.get_url:
    url: https://twilio-cli-prod.s3.amazonaws.com/twilio_pub.asc
    dest: /etc/apt/keyrings/twilio.asc
    mode: '0644'
  become: true
  when: apt_repo_twilio

- name: Add Twilio apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/twilio.asc] https://twilio-cli-prod.s3.amazonaws.com/apt/ /"
    filename: twilio
    state: present
  become: true
  when: apt_repo_twilio

- name: Install Twilio CLI
  ansible.builtin.package:
    name: twilio
    state: present
    update_cache: true
  become: true
  when: apt_repo_twilio

# --- Yarn ---

- name: Download Yarn GPG key
  ansible.builtin.get_url:
    url: https://dl.yarnpkg.com/debian/pubkey.gpg
    dest: /etc/apt/keyrings/yarn.asc
    mode: '0644'
  become: true
  when: apt_repo_yarn

- name: Add Yarn apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/yarn.asc] https://dl.yarnpkg.com/debian stable main"
    filename: yarn
    state: present
  become: true
  when: apt_repo_yarn

- name: Install Yarn
  ansible.builtin.apt:
    name: yarn
    state: present
    install_recommends: false
    update_cache: true
  become: true
  when: apt_repo_yarn

# --- Microsoft ---

- name: Download Microsoft GPG key
  ansible.builtin.get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /etc/apt/keyrings/microsoft.asc
    mode: '0644'
  become: true
  when: apt_repo_microsoft

- name: Add Microsoft apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/microsoft.asc] https://packages.microsoft.com/debian/{{ ansible_distribution_major_version }}/prod {{ ansible_distribution_release }} main"
    filename: microsoft
    state: present
  become: true
  when: apt_repo_microsoft
