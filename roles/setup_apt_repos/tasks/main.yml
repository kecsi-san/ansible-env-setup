---
# Shared prerequisite for all signed repos
- name: Install apt prerequisites
  ansible.builtin.package:
    name:
      - ca-certificates
      - curl
    state: present
  become: true

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true

# --- Docker CE ---

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
  become: true
  when: apt_repo_docker

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
    filename: docker
    state: present
  become: true
  when: apt_repo_docker

- name: Install Docker CE packages
  ansible.builtin.package:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true
  become: true
  when: apt_repo_docker

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user_id }}"
    groups: docker
    append: true
  become: true
  when: apt_repo_docker

# --- Grafana ---

- name: Download Grafana GPG key
  ansible.builtin.get_url:
    url: https://apt.grafana.com/gpg.key
    dest: /etc/apt/keyrings/grafana.asc
    mode: '0644'
  become: true
  when: apt_repo_grafana

- name: Add Grafana apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/grafana.asc] https://apt.grafana.com stable main"
    filename: grafana
    state: present
  become: true
  when: apt_repo_grafana

- name: Install Grafana
  ansible.builtin.package:
    name: grafana
    state: present
    update_cache: true
  become: true
  when: apt_repo_grafana

# --- Telegraf (InfluxDB repo) ---

- name: Download InfluxDB GPG key
  ansible.builtin.get_url:
    url: https://repos.influxdata.com/influxdb.key
    dest: /etc/apt/keyrings/influxdb.asc
    mode: '0644'
  become: true
  when: apt_repo_telegraf

- name: Add Telegraf apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/influxdb.asc] https://repos.influxdata.com/debian {{ ansible_distribution_release }} stable"
    filename: influxdb
    state: present
  become: true
  when: apt_repo_telegraf

- name: Install Telegraf
  ansible.builtin.package:
    name: telegraf
    state: present
    update_cache: true
  become: true
  when: apt_repo_telegraf

# --- Charm / Gum (no GPG — self-signed repo) ---

- name: Add Charm apt repository
  ansible.builtin.apt_repository:
    repo: "deb [trusted=yes] https://repo.charm.sh/apt/ /"
    filename: charm
    state: present
  become: true
  when: apt_repo_charm

- name: Install Gum
  ansible.builtin.package:
    name: gum
    state: present
    update_cache: true
  become: true
  when: apt_repo_charm

# --- Mise ---

- name: Download Mise GPG key
  ansible.builtin.get_url:
    url: https://mise.jdx.dev/gpg-key.pub
    dest: /etc/apt/keyrings/mise.asc
    mode: '0644'
  become: true
  when: apt_repo_mise

- name: Add Mise apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/mise.asc arch=amd64] https://mise.jdx.dev/deb stable main"
    filename: mise
    state: present
  become: true
  when: apt_repo_mise

- name: Install Mise
  ansible.builtin.package:
    name: mise
    state: present
    update_cache: true
  become: true
  when: apt_repo_mise

# --- Mozilla / Firefox ---

- name: Download Mozilla GPG key
  ansible.builtin.get_url:
    url: https://packages.mozilla.org/apt/repo-signing-key.gpg
    dest: /etc/apt/keyrings/packages.mozilla.org.asc
    mode: '0644'
  become: true
  when: apt_repo_mozilla

- name: Add Mozilla apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/packages.mozilla.org.asc] https://packages.mozilla.org/apt mozilla main"
    filename: mozilla
    state: present
  become: true
  when: apt_repo_mozilla

- name: Set Mozilla apt pin priority
  ansible.builtin.copy:
    dest: /etc/apt/preferences.d/mozilla
    content: |
      Package: *
      Pin: origin packages.mozilla.org
      Pin-Priority: 1000
    mode: '0644'
  become: true
  when: apt_repo_mozilla

- name: Install Firefox packages
  ansible.builtin.package:
    name: "{{ mozilla_packages }}"
    state: present
    update_cache: true
  become: true
  when: apt_repo_mozilla

# --- Sury PHP ---

- name: Download Sury PHP GPG key
  ansible.builtin.get_url:
    url: https://packages.sury.org/php/apt.gpg
    dest: /etc/apt/keyrings/sury-php.gpg
    mode: '0644'
  become: true
  when: apt_repo_sury_php

- name: Add Sury PHP apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/sury-php.gpg] https://packages.sury.org/php/ {{ ansible_distribution_release }} main"
    filename: sury-php
    state: present
  become: true
  when: apt_repo_sury_php

# --- Gitea (repo-only; install gitea package separately) ---

- name: Download Gitea GPG key
  ansible.builtin.get_url:
    url: https://packaging.gitlab.io/gitea/gpg.key
    dest: /etc/apt/keyrings/gitea.asc
    mode: '0644'
  become: true
  when: apt_repo_gitea

- name: Add Gitea apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/gitea.asc] https://packaging.gitlab.io/gitea gitea main"
    filename: gitea
    state: present
  become: true
  when: apt_repo_gitea

