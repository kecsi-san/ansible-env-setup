---
- name: Load OS specific variables
  ansible.builtin.include_vars: "os/{{ ansible_system }}.yml"
  tags:
    - sudo

- name: Setup sudo w/o pwd for any cmd for user {{ sudo_user }}
  ansible.builtin.lineinfile:
    path: "/etc/sudoers.d/{{ sudo_user }}"
    state: present
    regexp: '^%{{ sudo_user }}   ALL ='
    line: '{{ sudo_user }}   ALL = NOPASSWD: ALL'
    create: true
    validate: "{{ visudo_path }} -cf %s"
  become: true
  tags:
    - sudo
