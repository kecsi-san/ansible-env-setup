---
- name: Replace 'bookworm' with 'trixie' in /etc/apt/sources.list
  ansible.builtin.replace:
    path: /etc/apt/sources.list
    regexp: 'bookworm'
    replace: 'trixie'
  when: ansible_os_family == 'Debian' and ansible_facts['distribution_release'] == 'bookworm'

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
  when: ansible_os_family == 'Debian'

- name: Remove apt-listchanges package
  ansible.builtin.apt:
    name: apt-listchanges
    state: absent
  when: ansible_os_family == 'Debian' and ansible_facts['distribution_release'] == 'bookworm'

- name: Upgrade installed packages (without installing new packages)
  ansible.builtin.command:
    cmd: apt upgrade --without-new-pkgs -y
  register: upgrade_result
  when: ansible_os_family == 'Debian' and ansible_facts['distribution_release'] == 'bookworm' 
  changed_when: "'upgraded' in upgrade_result.stdout or 'upgraded' in upgrade_result.stderr"

- name: Full upgrade with auto clean afterwards
  ansible.builtin.apt:
    upgrade: dist
    autoclean: yes
  when: ansible_os_family == 'Debian' and ansible_facts['distribution_release'] == 'bookworm' and (upgrade_result is defined and ('upgraded' in upgrade_result.stdout or 'upgraded' in upgrade_result.stderr))
  register: full_upgrade_result
  changed_when: full_upgrade_result.changed

- name: Autoremove unused packages
  ansible.builtin.apt:
    autoremove: yes
  when: ansible_os_family == 'Debian'

- name: Reboot if needed
  ansible.builtin.reboot:
    reboot_timeout: 600
  when: ansible_facts['os_family'] == 'Debian' and ansible_facts['distribution_release'] == 'bookworm' and (full_upgrade_result is defined and full_upgrade_result.changed)
  
- name: Modernize sources
  ansible.builtin.command:
    cmd: apt modernize-sources
  register: modernize_result
  changed_when: modernize_result.rc == 0
  when: ansible_os_family == 'Debian' and ansible_facts['distribution_release'] == 'trixie'

- name: Final upgrade after modernize
  ansible.builtin.apt:
    upgrade: dist
    autoclean: yes
    clean: yes
  when: modernize_result is defined and modernize_result.rc == 0
  register: final_upgrade_result
  changed_when: final_upgrade_result.changed
  when: ansible_os_family == 'Debian' and ansible_facts['distribution_release'] == 'trixie'
