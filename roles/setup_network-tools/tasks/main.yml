---
- name: Load OS specific variables
  ansible.builtin.include_vars: "os/{{ ansible_distribution }}.yml"
  tags: network, always

- name: Install network packages
  ansible.builtin.package:
    name: "{{ network_packages }}"
    state: present
    update_cache: true
  become: true
  when: network_tools_enabled and network_packages is defined and ansible_system == 'Linux'
  tags: network

- name: Install network tools via Homebrew
  community.general.homebrew:
    name: "{{ network_brew_packages }}"
    state: present
    update_homebrew: true
  become: false
  when: network_tools_enabled and network_brew_packages is defined and ansible_system == 'Darwin'
  tags: network
