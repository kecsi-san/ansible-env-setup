---
- name: Download Microsoft GPG key
  ansible.builtin.get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /tmp/microsoft.asc
    mode: '0644'
  become: false

- name: Import Microsoft GPG key
  ansible.builtin.shell:
    cmd: gpg --dearmor < /tmp/microsoft.asc > /etc/apt/keyrings/packages.microsoft.gpg
    creates: /etc/apt/keyrings/packages.microsoft.gpg
  become: true

- name: Add VS Code apt repository
  ansible.builtin.copy:
    content: "deb [arch=amd64,arm64,armhf signed-by=/etc/apt/keyrings/packages.microsoft.gpg] https://packages.microsoft.com/repos/code stable main\n"
    dest: /etc/apt/sources.list.d/vscode.list
    mode: '0644'
  become: true

- name: Install VS Code
  ansible.builtin.package:
    name: code
    state: present
    update_cache: true
  become: true

- name: Install VS Code extensions
  ansible.builtin.command:
    cmd: "{{ vscode_bin }} --install-extension {{ item }}"
  loop: "{{ vscode_extensions }}"
  become: false
  changed_when: false

- name: Ensure VS Code user config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/Code/User"
    state: directory
    mode: '0755'
  become: false

- name: Deploy VS Code settings
  ansible.builtin.copy:
    src: settings.json
    dest: "{{ ansible_env.HOME }}/.config/Code/User/settings.json"
    mode: '0644'
  become: false
