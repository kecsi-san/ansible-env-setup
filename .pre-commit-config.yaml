---
# Uses system-installed tools (installed via setup_python-uv role).
# Avoids isolated-env version conflicts between ansible-lint and ansible-core.
repos:
  - repo: local
    hooks:
      - id: yamllint
        name: yamllint
        entry: yamllint
        language: system
        types: [yaml]
        args: [--strict]

      # ansible-lint runs in CI (GitHub Actions) — too slow for pre-commit (~70s)
