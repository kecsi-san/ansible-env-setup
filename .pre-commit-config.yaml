---
# Uses system-installed tools (installed via setup_python-uv role).
# Avoids isolated-env version conflicts between ansible-lint and ansible-core.
repos:
  - repo: local
    hooks:
      - id: yamllint
        name: yamllint
        entry: yamllint
        language: system
        types: [yaml]
        args: [--strict]

      - id: ansible-lint
        name: ansible-lint
        entry: ansible-lint
        language: system
        pass_filenames: false
        always_run: true
